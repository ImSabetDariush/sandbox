name: 0x00 dl

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL(s) to download (comma or space separated)'
        required: true
        type: string
      quality:
        description: 'Quality / Format'
        required: false
        default: 'Best'
        type: choice
        options:
          - Best
          - 720p
          - 480p
          - 360p
          - Audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 unzip npm
          sudo npm install -g bun

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests beautifulsoup4

      - name: Download & Process Files (Supports Multiple URLs)
        shell: bash
        env:
          PH_SCRAPER: |
            import sys, requests, time, re
            from bs4 import BeautifulSoup
            
            model_url = sys.argv[1].rstrip('/')
            video_urls = []
            page = 1
            
            while True:
                page_url = f"{model_url}?page={page}"
                try:
                    resp = requests.get(page_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=30)
                    resp.raise_for_status()
                    soup = BeautifulSoup(resp.text, 'html.parser')
                except:
                    break
            
                found = False
                for a in soup.find_all('a', href=True):
                    href = a['href']
                    if '/view_video.php?viewkey=' in href:
                        full = f"https://www.pornhub.com{href}" if not href.startswith('http') else href
                        video_urls.append(full)
                        found = True
            
                if not found:
                    break
                page += 1
                time.sleep(1)   # محدودیت نرخ
            
            for url in video_urls:
                print(url)
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')
          
          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl
          
          # انتخاب کیفیت
          if [[ "$QUALITY" == *"720p"* ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == *"480p"* ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == *"360p"* ]]; then
            YTDLP_F="-f bestvideo[ext=mp4][height<=360]+bestaudio[ext=m4a]/best[ext=mp4][height<=360]/best --merge-output-format mp4"
          elif [[ "$QUALITY" == *"Audio"* ]]; then
            YTDLP_F="-x --audio-format mp3"
          else
            YTDLP_F="--merge-output-format mp4"
          fi

          # دانلودر سریع
          YTDLP_FAST="--downloader aria2c --downloader-args \"aria2c:-x 4 -s 4 -j 4\" --concurrent-fragments 4"

          for URL in $FORMATTED_URLS; do
            [ -z "$URL" ] && continue
            echo "==========================================="
            echo "Processing URL: $URL"
            echo "==========================================="

            # ---- Pornhub Model / Creator Page ----
            if echo "$URL" | grep -qE "pornhub\.(com|org|net)/(model|pornstar)/"; then
              echo "Scraping Pornhub model page: $URL"
              
              # Load the Python script from the environment variable
              echo "$PH_SCRAPER" > ph_scraper.py
              python3 ph_scraper.py "$URL" > ph_videos.txt

              if [ -s ph_videos.txt ]; then
                echo "Found $(wc -l < ph_videos.txt) videos. Starting download..."
                COOKIE_ARG=""
                [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
                yt-dlp --js-runtimes bun:bun $COOKIE_ARG $YTDLP_FAST $YTDLP_F \
                  -o "tmp_downloads/%(title)s.%(ext)s" --batch-file ph_videos.txt
              else
                echo "No videos found on this model page."
              fi
              rm -f ph_videos.txt ph_scraper.py

            # ---- Bunkr ----
            elif echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Downloading from Bunkr..."
              if [ -f bunkr.py ]; then
                python3 bunkr.py "$URL" "tmp_downloads"
              else
                echo "bunkr.py not found! Ensure it is in your repository."
              fi

            # ---- YouTube / Twitch / supported streaming ----
            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud)"; then
              echo "Downloading with yt-dlp..."
              COOKIE_ARG=""
              [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
              yt-dlp --js-runtimes bun:bun $COOKIE_ARG $YTDLP_FAST $YTDLP_F -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            # ---- لینک مستقیم / ناشناخته ----
            else
              echo "Downloading direct file with aria2..."
              aria2c --split=4 --max-connection-per-server=4 --dir="tmp_downloads" "$URL"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Downloaded-Files
          path: tmp_downloads/
          retention-days: 1
