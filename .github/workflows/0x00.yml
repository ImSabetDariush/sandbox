name: 0x00 dl

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL(s) to download (separate multiple URLs with space)'
        required: true
      max_pornhub_videos:
        description: 'Max recent videos to download from Pornhub (0 = all)'
        required: false
        default: '10'
      compress:
        description: 'Compress into 95MB parts?'
        required: false
        default: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - id: cache-ytdlp
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/yt-dlp
          key: ytdlp-${{ runner.os }}-${{ steps.ytdlp-version.outputs.version }}

      - name: Get latest yt-dlp version
        id: ytdlp-version
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          VERSION=$(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download yt-dlp
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/download/${{ steps.ytdlp-version.outputs.version }}/yt-dlp_linux" -o ~/.local/bin/yt-dlp
          chmod +x ~/.local/bin/yt-dlp

      - name: Add yt-dlp to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install required packages
        run: sudo apt-get update -qq && sudo apt-get install -y -qq aria2 jq parallel || true

      # ----- YouTube Cookies -----
      - name: Setup YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > yt_cookies.txt
          else
            touch yt_cookies.txt
          fi

      # ----- Pornhub Cookies (auto-generate if secret empty) -----
      - name: Setup Pornhub cookies
        env:
          PH_COOKIES: ${{ secrets.PORNHUB_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            echo "$PH_COOKIES" > ph_cookies.txt
          else
            echo "# Netscape HTTP Cookie File" > ph_cookies.txt
            echo ".pornhub.com	TRUE	/	FALSE	0	age_verified	1" >> ph_cookies.txt
            echo ".pornhub.com	TRUE	/	FALSE	0	platform	pc" >> ph_cookies.txt
          fi

      - name: Prepare yt-dlp options
        run: |
          YTDLP_F=(--no-playlist --no-warnings --progress --newline --embed-metadata --merge-output-format mkv)
          echo "YTDLP_F=${YTDLP_F[*]}" >> "$GITHUB_ENV"

      # ---------- Main Download ----------
      - name: Download content
        run: |
          mkdir -p tmp_downloads
          URLS=(${{ github.event.inputs.url }})
          for URL in "${URLS[@]}"; do
            echo "Processing: $URL"

            # ---- Pornhub Model / Pornstar ----
            if echo "$URL" | grep -qE "pornhub\.(com|org|net)/(model|pornstar)/"; then
              PH_COOKIE_ARG=()
              [ -s ph_cookies.txt ] && PH_COOKIE_ARG=(--cookies ph_cookies.txt)

              LIMIT="${{ github.event.inputs.max_pornhub_videos }}"
              if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then
                PLAYLIST_ARG=(--playlist-end "$LIMIT")
              else
                PLAYLIST_ARG=()
              fi

              yt-dlp --js-runtimes bun:bun \
                "${PH_COOKIE_ARG[@]}" \
                --downloader aria2c \
                --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                --concurrent-fragments 4 \
                "${YTDLP_F[@]}" \
                "${PLAYLIST_ARG[@]}" \
                --extractor-args "pornhub:skip_pot=1" \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"

            # ---- Bunkr Album ----
            elif echo "$URL" | grep -qE "bunkr\.(is|ru|si|la|ac|media)/"; then
              # اگر bunkr.py وجود ندارد، از yt-dlp استفاده کن
              if [ -f bunkr.py ]; then
                python3 bunkr.py "$URL" > bunkr_links.txt
                if [ -s bunkr_links.txt ]; then
                  yt-dlp --js-runtimes bun:bun \
                    --downloader aria2c \
                    --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                    --concurrent-fragments 4 \
                    "${YTDLP_F[@]}" \
                    -o "tmp_downloads/%(title)s.%(ext)s" \
                    --batch-file bunkr_links.txt
                fi
                rm -f bunkr_links.txt
              else
                yt-dlp --downloader aria2c \
                  --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                  --concurrent-fragments 4 \
                  "${YTDLP_F[@]}" \
                  -o "tmp_downloads/%(title)s.%(ext)s" \
                  "$URL"
              fi

            # ---- YouTube / Twitch / Reddit ----
            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|redd\.it)"; then
              YT_COOKIE_ARG=()
              [ -s yt_cookies.txt ] && YT_COOKIE_ARG=(--cookies yt_cookies.txt)

              yt-dlp --js-runtimes bun:bun \
                "${YT_COOKIE_ARG[@]}" \
                --downloader aria2c \
                --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                --concurrent-fragments 4 \
                "${YTDLP_F[@]}" \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"

            # ---- Direct links ----
            else
              echo "Treating as direct link."
              aria2c -x 4 -s 4 -j 4 --dir=tmp_downloads "$URL"
            fi
          done

      # ----- Compress & Split -----
      - name: Compress and split
        if: github.event.inputs.compress != 'false'
        run: |
          if ls tmp_downloads/* >/dev/null 2>&1; then
            cd tmp_downloads
            for f in *; do
              [ -f "$f" ] && tar -czf - "$f" | split -b 95M - "${f}.part." && rm -f "$f"
            done
          fi

      # ----- Update repo -----
      - name: Update Links.md
        if: success()
        run: |
          echo "# Downloads ($(date -u +"%Y-%m-%d %H:%M UTC"))" > Links.md
          ls tmp_downloads/ | while read line; do echo "- [$line]($line)" >> Links.md; done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add -A
          git diff --staged --quiet || (git commit -m "Auto upload $(date -u +"%Y-%m-%d %H:%M UTC")" && git push)
