name: 0x00 dl

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL(s) to download (separate multiple URLs with space)'
        required: true
      max_pornhub_videos:
        description: 'Max recent videos to download from Pornhub (0 = all)'
        required: false
        default: '10'
      # (اختیاری) فشرده‌سازی نهایی
      compress:
        description: 'Compress into 95MB parts?'
        required: false
        default: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐰 Setup Bun (with built-in caching)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # کش yt-dlp (نسخه‌بندی بر اساس آخرین release tag)
      - name: Cache yt-dlp binary
        id: cache-ytdlp
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/yt-dlp
          key: ytdlp-${{ runner.os }}-${{ steps.ytdlp-version.outputs.version }}

      - name: Get latest yt-dlp version
        id: ytdlp-version
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          VERSION=$(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download yt-dlp
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/download/${{ steps.ytdlp-version.outputs.version }}/yt-dlp_linux" -o ~/.local/bin/yt-dlp
          chmod +x ~/.local/bin/yt-dlp

      - name: Add yt-dlp to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ابزارهای لازم
      - name: Install required packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 jq parallel || true

      # آرایه‌های ثابت برای yt-dlp
      - name: Prepare yt-dlp options
        id: ytdlp-opts
        run: |
          export YTDLP_F=(--no-playlist --no-warnings --progress --newline --embed-metadata --merge-output-format mkv)
          echo "YTDLP_F=${YTDLP_F[*]}" >> "$GITHUB_ENV"

      # ----- کوکی‌های YouTube -----
      - name: Setup YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > yt_cookies.txt
          else
            touch yt_cookies.txt
          fi

      # ----- کوکی‌های Pornhub -----
      - name: Setup Pornhub cookies
        env:
          PH_COOKIES: ${{ secrets.PORNHUB_COOKIES }}
        run: |
          if [ -n "$PH_COOKIES" ]; then
            echo "$PH_COOKIES" > ph_cookies.txt
          else
            touch ph_cookies.txt
          fi

      # دانلود اصلی
      - name: Download content
        run: |
          mkdir -p tmp_downloads
          # خواندن URLهای ورودی (جدا شده با فاصله)
          URLS=(${{ github.event.inputs.url }})

          for URL in "${URLS[@]}"; do
            echo "Processing: $URL"

            # ---- Pornhub Model / Creator Page ----
            if echo "$URL" | grep -qE "pornhub\.(com|org|net)/(model|pornstar)/"; then
              echo "Scraping Pornhub model page: $URL"
              python3 ph_scraper.py "$URL" > ph_videos_full.txt

              # محدود کردن به N ویدیوی آخر
              LIMIT="${{ github.event.inputs.max_pornhub_videos }}"
              if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then
                head -n "$LIMIT" ph_videos_full.txt > ph_videos.txt
              else
                cp ph_videos_full.txt ph_videos.txt
              fi

              if [ -s ph_videos.txt ]; then
                echo "Found $(wc -l < ph_videos.txt) videos (limited to $LIMIT). Downloading..."

                PH_COOKIE_ARG=()
                [ -s ph_cookies.txt ] && PH_COOKIE_ARG=(--cookies ph_cookies.txt)

                yt-dlp --js-runtimes bun:bun \
                  "${PH_COOKIE_ARG[@]}" \
                  --downloader aria2c \
                  --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                  --concurrent-fragments 4 \
                  "${YTDLP_F[@]}" \
                  -o "tmp_downloads/%(title)s.%(ext)s" \
                  --batch-file ph_videos.txt
              else
                echo "No videos found for this model."
              fi
              rm -f ph_videos_full.txt ph_videos.txt

            # ---- Bunkr Album ----
            elif echo "$URL" | grep -qE "bunkr\.(is|ru|si|la|ac|media)/"; then
              echo "Extracting Bunkr album: $URL"
              python3 bunkr.py "$URL" > bunkr_links.txt

              if [ -s bunkr_links.txt ]; then
                echo "Found $(wc -l < bunkr_links.txt) files. Downloading..."
                yt-dlp --js-runtimes bun:bun \
                  --downloader aria2c \
                  --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                  --concurrent-fragments 4 \
                  "${YTDLP_F[@]}" \
                  -o "tmp_downloads/%(title)s.%(ext)s" \
                  --batch-file bunkr_links.txt
              else
                echo "No links extracted from Bunkr."
              fi
              rm -f bunkr_links.txt

            # ---- YouTube / Twitch / Reddit ----
            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|redd\.it)"; then
              YT_COOKIE_ARG=()
              [ -s yt_cookies.txt ] && YT_COOKIE_ARG=(--cookies yt_cookies.txt)

              yt-dlp --js-runtimes bun:bun \
                "${YT_COOKIE_ARG[@]}" \
                --downloader aria2c \
                --downloader-args "aria2c:-x 4 -s 4 -j 4" \
                --concurrent-fragments 4 \
                "${YTDLP_F[@]}" \
                -o "tmp_downloads/%(title)s.%(ext)s" \
                "$URL"

            # ---- Direct links (or fallback) ----
            else
              echo "Treating as direct link. Downloading with aria2c..."
              aria2c -x 4 -s 4 -j 4 --dir=tmp_downloads "$URL"
            fi
          done

      # فشرده‌سازی و تقسیم (اختیاری)
      - name: Compress and split
        if: github.event.inputs.compress != 'false'
        run: |
          if ls tmp_downloads/* >/dev/null 2>&1; then
            cd tmp_downloads
            for f in *; do
              if [ -f "$f" ]; then
                tar -czf - "$f" | split -b 95M - "${f}.part."
                rm -f "$f"
              fi
            done
          fi

      # به‌روزرسانی Links.md و commit
      - name: Update Links.md
        run: |
          echo "# Downloads ($(date -u +"%Y-%m-%d %H:%M UTC"))" > Links.md
          ls tmp_downloads/ | while read line; do
            echo "- [$line]($line)" >> Links.md
          done
          cat Links.md

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & Push
        run: |
          git add -A
          git diff --staged --quiet || (
            git commit -m "Auto upload $(date -u +"%Y-%m-%d %H:%M UTC")"
            git push
          )
