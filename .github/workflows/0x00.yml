name: 0x00 dl

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URLs (Separate with space, comma, or new line)'
        required: true
        type: string
      quality:
        description: 'Video Quality (for supported extractors)'
        required: true
        type: choice
        options:
          - '480p (MP4 format - Recommended for <95MB)'
          - '720p (MP4 format)'
          - '360p (MP4 format)'
          - 'Audio (MP3 format)'
          - 'Best (Highest available)'
      password:
        description: 'ZIP Password (Optional - No ZIP applied if empty & under 95MB)'
        required: false
        type: string
        default: ''

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install prerequisites (jq, aria2, ffmpeg, 7zip)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq aria2 p7zip-full ffmpeg

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get latest yt-dlp version tag
        id: ytdlp_version
        run: |
          echo "tag=$(curl -sL https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest \
            | jq -r .tag_name)" >> $GITHUB_OUTPUT

      - name: Cache yt-dlp binary
        id: cache-ytdlp
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/yt-dlp
          key: yt-dlp-${{ runner.os }}-${{ steps.ytdlp_version.outputs.tag }}

      - name: Install yt-dlp if not cached
        if: steps.cache-ytdlp.outputs.cache-hit != 'true'
        run: |
          sudo curl -L \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install Python dependencies
        run: pip install --quiet requests beautifulsoup4

      - name: Setup YouTube Cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Setup Bunkr script
        run: |
          cat << 'EOF' > bunkr.py
import os, sys, json, time, base64, requests
from math import floor
from itertools import cycle
from urllib.parse import urlparse

BUNKRR_API = "https://bunkr.cr/api/vs"
BUNKRR_DOMAINS = ("bunkr.si", "bunkr.fi", "bunkr.ru", "bunkr.cr", "bunkr.rip", "bunkrr.su")
BUNKRR_DOWNLOAD_HEADERS = {"User-Agent": "Mozilla/5.0", "Referer": "https://get.bunkrr.su/"}
_offline_subs = set()

def get_slug(url):
    import re
    m = re.search(r"/([a-zA-Z0-9_-]+)$", url)
    return m.group(1) if m else None

def fetch_api(url):
    slug = get_slug(url)
    if not slug:
        return None
    for dom in (BUNKRR_API.split("/")[2], *_offline_subs):
        try:
            resp = requests.post(
                f"https://{dom}/api/vs",
                json={"slug": slug},
                headers=BUNKRR_DOWNLOAD_HEADERS,
                timeout=30
            )
            if resp.status_code == 200:
                return resp.json()
            if resp.status_code == 502:
                _offline_subs.add(dom)
        except:
            continue
    return None

def decrypt(api_resp):
    try:
        t = api_resp["timestamp"]
        enc = base64.b64decode(api_resp["url"])
        key = f"SECRET_KEY_{floor(t/3600)}".encode("utf-8")
        dec = bytearray(b ^ next(cycle(key)) for b in enc)
        return dec.decode("utf-8", errors="ignore")
    except:
        return None

if __name__ == "__main__":
    url = sys.argv[1]
    outdir = sys.argv[2]
    api_resp = fetch_api(url)
    dl_link = decrypt(api_resp) if api_resp else None
    if dl_link:
        filename = urlparse(dl_link).path.rstrip("/").split("/")[-1]
        filepath = os.path.join(outdir, filename)
        resp = requests.get(dl_link, headers=BUNKRR_DOWNLOAD_HEADERS, stream=True)
        with open(filepath, "wb") as f:
            for c in resp.iter_content(8192):
                if c:
                    f.write(c)
EOF

      - name: Download & Process Files
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"

          FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')

          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl

          # Quality selection
          if [[ "$QUALITY" == *"720p"* ]]; then
            YTDLP_F="-f bestvideo[height<=720]+bestaudio/best[height<=720] --merge-output-format mp4"
          elif [[ "$QUALITY" == *"480p"* ]]; then
            YTDLP_F="-f bestvideo[height<=480]+bestaudio/best[height<=480] --merge-output-format mp4"
          elif [[ "$QUALITY" == *"360p"* ]]; then
            YTDLP_F="-f bestvideo[height<=360]+bestaudio/best[height<=360] --merge-output-format mp4"
          elif [[ "$QUALITY" == *"Audio"* ]]; then
            YTDLP_F="-x --audio-format mp3"
          else
            YTDLP_F="--merge-output-format mp4"
          fi

          YTDLP_FAST="--downloader aria2c --downloader-args \"aria2c:-x 4 -s 4 -j 4\" --concurrent-fragments 4"

          for URL in $FORMATTED_URLS; do
            [[ -z "$URL" ]] && continue
            echo "Processing: $URL"

            # Pornhub model page scraper
            if echo "$URL" | grep -qE "pornhub\.(com|org|net)/(model|pornstar)/"; then
              python3 - "$URL" << 'PYEOF' > ph_videos.txt
import sys, requests, time
from bs4 import BeautifulSoup

model_url = sys.argv[1].rstrip('/')
video_urls = []
page = 1

while True:
    page_url = f"{model_url}?page={page}"
    try:
        resp = requests.get(page_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=30)
        resp.raise_for_status()
        soup = BeautifulSoup(resp.text, "html.parser")
    except:
        break

    found = False
    for a in soup.find_all("a", href=True):
        if "/view_video.php?viewkey=" in a['href']:
            full = a['href']
            if not full.startswith("http"):
                full = "https://www.pornhub.com" + full
            video_urls.append(full)
            found = True

    if not found:
        break

    page += 1
    time.sleep(1)

for u in video_urls:
    print(u)
PYEOF

              if [ -s ph_videos.txt ]; then
                COOKIE_ARG=""
                [[ -s youtube_cookies.txt ]] && COOKIE_ARG="--cookies youtube_cookies.txt"

                yt-dlp --js-runtimes bun:bun $COOKIE_ARG $YTDLP_FAST $YTDLP_F \
                  -o "tmp_downloads/%(title)s.%(ext)s" --batch-file ph_videos.txt
              fi
              rm -f ph_videos.txt

            elif echo "$URL" | grep -qE "bunkr\.(si|fi|ru|cr|rip)|bunkrr\.su"; then
              python3 bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "(youtube|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud)"; then
              COOKIE_ARG=""
              [[ -s youtube_cookies.txt ]] && COOKIE_ARG="--cookies youtube_cookies.txt"

              yt-dlp --js-runtimes bun:bun $COOKIE_ARG $YTDLP_FAST $YTDLP_F \
                -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            else
              aria2c --split=4 --max-connection-per-server=4 --dir="tmp_downloads" "$URL"
            fi
          done

      - name: Compress & Split
        shell: bash
        run: |
          set -euo pipefail

          PASS="${{ github.event.inputs.password }}"
          LIMIT=$((95 * 1024 * 1024))

          : > new_files.txt

          for FILE in tmp_downloads/*; do
            [[ ! -f "$FILE" ]] && continue

            SIZE=$(stat -c%s "$FILE")
            NAME=$(basename "$FILE")

            rm -f "dl/${NAME}" "dl/${NAME}.7z" "dl/${NAME}.7z".*

            if [[ "$SIZE" -gt "$LIMIT" || -n "$PASS" ]]; then
              if [[ -n "$PASS" ]]; then
                7z a -t7z -mx=0 -mhe=on -p"$PASS" -v95m "dl/${NAME}.7z" "$FILE"
              else
                7z a -t7z -mx=0 -v95m "dl/${NAME}.7z" "$FILE"
              fi

              for P in dl/${NAME}.7z.*; do
                [[ -f "$P" ]] && basename "$P" >> new_files.txt
              done
            else
              cp -f "$FILE" "dl/$NAME"
              echo "$NAME" >> new_files.txt
            fi
          done

      - name: Update Links.md
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"

          HEADER="## 🔗 Direct Download Links\n> Click to download.\n\n"

          echo "### 📅 $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M') IR" > current_run.md

          while IFS= read -r NAME; do
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$NAME'''))")
            RAW="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED"

            CLEAN=$(echo "$NAME" | sed -E 's/android[0-9]\+_//g; s/-release//g')

            SIZE=$(python3 - << EOF
import os
p = "dl/$NAME"
s = os.path.getsize(p)
print(f"{s/1048576:.1f}MB" if s >= 1048576 else f"{s//1024}KB")
EOF
)

            EXT="${NAME##*.}"
            case "$EXT" in
              apk) ICON="📱" ;;
              mp4|mkv|avi|mov) ICON="🎬" ;;
              mp3|m4a|flac|ogg) ICON="🎵" ;;
              7z|zip|[0-9][0-9][0-9]) ICON="🗜️" ;;
              *) ICON="📥" ;;
            esac

            echo "- $ICON [$CLEAN]($RAW) \`$SIZE\`" >> current_run.md
          done < new_files.txt

          echo -e "\n---\n" >> current_run.md

          if [[ -f Links.md ]]; then
            tail -n +2 Links.md > old.md
            echo -e "$HEADER" > Links.md
            cat current_run.md old.md >> Links.md
            rm old.md
          else
            echo -e "$HEADER" > Links.md
            cat current_run.md >> Links.md
          fi

      - name: Push to Repository
        run: |
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add dl/ Links.md
          git commit -m "Add downloaded files via Panel [skip ci]" || true
          git push origin HEAD:${GITHUB_REF_NAME}
