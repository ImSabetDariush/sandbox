name: 0x00 dl

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URLs (Separate with space, comma, or new line)'
        required: true
        type: string
      quality:
        description: 'Video Quality (for supported extractors)'
        required: true
        type: choice
        options:
          - '480p (MP4 format - Recommended for <95MB)'
          - '720p (MP4 format)'
          - '360p (MP4 format)'
          - 'Audio (MP3 format)'
          - 'Best (Highest available)'
      password:
        description: 'ZIP Password (Optional - No ZIP applied if under 95MB)'
        required: false
        type: string
        default: ''

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read  # دیگر نیازی به write نیست چون Artifact آپلود می‌شود
    steps:
      - name: Checkout Repository (only for yt-dlp extractors)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends aria2 ffmpeg split
          
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Setup YouTube Cookies 
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube_cookies.txt
          else
            touch youtube_cookies.txt
          fi

      - name: Download & Process Files
        shell: bash
        run: |
          set -euo pipefail
          
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASS="${{ github.event.inputs.password }}"
          
          FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')
          mkdir -p tmp_downloads final_artifacts
          
          # تنظیم کیفیت yt-dlp
          case "$QUALITY" in
            *720p*)  YTDLP_F="-f bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best --merge-output-format mp4" ;;
            *480p*)  YTDLP_F="-f bestvideo[ext=mp4][height<=480]+bestaudio[ext=m4a]/best[ext=mp4][height<=480]/best --merge-output-format mp4" ;;
            *360p*)  YTDLP_F="-f bestvideo[ext=mp4][height<=360]+bestaudio[ext=m4a]/best[ext=mp4][height<=360]/best --merge-output-format mp4" ;;
            *Audio*) YTDLP_F="-x --audio-format mp3" ;;
            *)       YTDLP_F="--merge-output-format mp4" ;;
          esac
          
          download_video() {
            local url="$1"
            local outdir="$2"
            echo "▶️ Downloading with yt-dlp: $url"
            COOKIE_ARG=""
            [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
            yt-dlp $COOKIE_ARG $YTDLP_F -o "$outdir/%(title)s.%(ext)s" "$url"
          }
          
          download_direct() {
            local url="$1"
            local outdir="$2"
            echo "▶️ Direct download with aria2c: $url"
            aria2c --split=4 --max-connection-per-server=4 --timeout=60 --dir="$outdir" "$url"
          }
          
          for URL in $FORMATTED_URLS; do
            [ -z "$URL" ] && continue
            echo "========================================="
            echo "Processing: $URL"
            echo "========================================="
            
            if echo "$URL" | grep -qiE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|vimeo|soundcloud|bunkr)"; then
              # Bunkr هم توسط yt-dlp پشتیبانی می‌شود (البته ممکن است نیاز به بروزرسانی extractor داشته باشد)
              download_video "$URL" "tmp_downloads" || echo "⚠️ Failed: $URL"
            else
              download_direct "$URL" "tmp_downloads" || echo "⚠️ Failed: $URL"
            fi
          done
          
          # بررسی وجود فایل دانلود شده
          if [ -z "$(ls -A tmp_downloads 2>/dev/null)" ]; then
            echo "❌ هیچ فایلی دانلود نشد!"
            exit 1
          fi
          
          # پردازش هر فایل: زیپ با پسورد یا split در صورت نیاز
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            BASE_NOEXT="${BASENAME%.*}"
            
            # گزینه‌های زیپ
            ZIP_OPTS=""
            [ -n "$ZIP_PASS" ] && ZIP_OPTS="-P $ZIP_PASS"
            
            if [ -n "$ZIP_PASS" ] || [ "$SIZE" -gt "$LIMIT" ]; then
              echo "🔒 Zipping and splitting (if needed): $BASENAME"
              ZIP_BASE="final_artifacts/${BASE_NOEXT}"
              zip $ZIP_OPTS "$ZIP_BASE.zip" -j "$FILE"
              
              if [ "$SIZE" -gt "$LIMIT" ]; then
                # split کردن فایل زیپ شده به قطعات 95MB
                mv "$ZIP_BASE.zip" "$ZIP_BASE.full.zip"
                split -b 95m -d "$ZIP_BASE.full.zip" "$ZIP_BASE.part."
                rm "$ZIP_BASE.full.zip"
                # rename قطعات به نام‌های قابل تشخیص
                for part in "$ZIP_BASE.part."*; do
                  num="${part##*.part.}"
                  mv "$part" "final_artifacts/${BASE_NOEXT}.z${num}"
                done
                # تولید فایل اطلاعاتی برای بازسازی
                echo "برای بازسازی فایل اصلی، دستور زیر را اجرا کنید:" > "final_artifacts/${BASE_NOEXT}.README.txt"
                echo "cat ${BASE_NOEXT}.z* > ${BASE_NOEXT}.zip && unzip ${BASE_NOEXT}.zip (${ZIP_PASS:+-P $ZIP_PASS})" >> "final_artifacts/${BASE_NOEXT}.README.txt"
              fi
            else
              echo "📄 کپی فایل بدون زیپ: $BASENAME"
              cp "$FILE" "final_artifacts/$BASENAME"
            fi
          done
          
          rm -rf tmp_downloads
          
          # ایجاد فایل index.html ساده برای نمایش لینک‌ها
          cd final_artifacts
          cat > index.html << 'EOF'
          <html><head><title>Download Links</title></head><body>
          <h2>Download Artifacts</h2><ul>
          EOF
          for f in *; do
            [ -f "$f" ] && echo "<li><a href='$f'>$f</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html
          cd ..
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: final_artifacts/
          retention-days: 7
          compression-level: 0
